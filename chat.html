<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor Chat – StudyAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">StudyAI</a>
            <div class="d-flex align-items-center">
                <a href="/" class="me-4">Home</a>
                <i class="theme-toggle bi bi-moon-stars-fill" id="themeToggle"></i>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div class="card-glass p-4" style="max-width: 900px; margin: auto; height: 80vh; display: flex; flex-direction: column;">
            <h3 class="text-center mb-4 fw-bold"><i class="bi bi-robot me-2"></i> AI Tutor Chat</h3>
            <div id="chat-window" class="flex-grow-1 overflow-auto p-3 mb-3" style="background: rgba(255,255,255,0.3); border-radius: 16px;"></div>

            <div class="input-group">
                <input type="text" id="user-input" class="form-control form-control-lg" placeholder="Ask anything... (e.g. Explain Pythagoras theorem)">
                <button class="btn btn-primary" onclick="sendMessage()" title="Send message"><i class="bi bi-send-fill"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const chatWindow = document.getElementById("chat-window");

        function addMessage(text, type = "assistant") {
            const div = document.createElement("div");
            div.className = `message ${type} animate__animated animate__fadeIn`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, "user");
            input.value = "";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                addMessage(data.response);
            } catch (err) {
                addMessage("Sorry, something went wrong. Try again!", "assistant");
            }
        }

        // Welcome
        addMessage("Hi! I'm your AI study buddy. Ask me anything about your subjects — let's make learning fun! 🚀");

        // Enter key support
        document.getElementById("user-input").addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });

        // Dark mode
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            document.documentElement.setAttribute('data-bs-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
