<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator – StudyAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">StudyAI</a>
            <div class="d-flex align-items-center">
                <a href="/" class="me-4">Home</a>
                <i class="theme-toggle bi bi-moon-stars-fill" id="themeToggle"></i>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div class="card-glass p-4 p-md-5 mx-auto" style="max-width: 800px;">
            <h2 class="text-center mb-4 fw-bold">AI-Powered Quiz</h2>
            <div class="input-group input-group-lg mb-4">
                <input type="text" id="topic" class="form-control" placeholder="Topic (e.g. Photosynthesis, Quadratic Equations)">
                <button class="btn btn-primary" onclick="generateQuiz()">Generate Quiz</button>
            </div>

            <div id="quiz-container" class="mt-4"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentQuiz = [];

        async function generateQuiz() {
            const topic = document.getElementById("topic").value.trim();
            if (!topic) return alert("Please enter a topic!");

            document.getElementById("quiz-container").innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
                    <p class="mt-3">Creating smart quiz for "${topic}"...</p>
                </div>`;

            try {
                const res = await fetch("/generate_quiz", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({topic})
                });
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                currentQuiz = data.questions || [];
                let html = `<h4 class="mb-4">${topic} Quiz</h4><hr>`;

                currentQuiz.forEach((q, i) => {
                    html += `<div class="mb-4 p-3 card-glass">
                        <strong>Q${i+1}:</strong> ${q.question}<br><br>`;

                    if (q.type === "mcq") {
                        q.options.forEach(opt => {
                            const letter = opt.charAt(0);
                            html += `
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" name="q${i}" id="q${i}_${letter}" value="${letter}">
                                    <label class="form-check-label" for="q${i}_${letter}">${opt}</label>
                                </div>`;
                        });
                    } else {
                        html += `<textarea class="form-control mt-2" id="short${i}" rows="3" placeholder="Your answer..."></textarea>`;
                    }
                    html += `</div>`;
                });

                html += `<button onclick="submitQuiz()" class="btn btn-success btn-lg w-100 mt-3">Submit & See Results</button>`;
                document.getElementById("quiz-container").innerHTML = html;
            } catch (err) {
                document.getElementById("quiz-container").innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        function submitQuiz() {
            let score = 0;
            let total = currentQuiz.filter(q => q.type === "mcq").length;
            let html = `<h4 class="mb-4">Your Results</h4><hr>`;

            currentQuiz.forEach((q, i) => {
                html += `<div class="mb-4 p-3 border rounded">
                    <strong>${q.question}</strong><br>`;

                if (q.type === "mcq") {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    const ans = selected ? selected.value : null;
                    if (ans === q.correct) {
                        score++;
                        html += `<span class="text-success fw-bold">Correct! ✓</span>`;
                    } else {
                        html += `<span class="text-danger fw-bold">Incorrect • Correct: ${q.correct}</span>`;
                    }
                } else {
                    const userAns = document.getElementById(`short${i}`).value.trim() || "(not answered)";
                    html += `<strong>Your answer:</strong> ${userAns}<br>
                             <strong>Model answer:</strong> ${q.answer}`;
                }

                html += `<br><small class="text-muted mt-2 d-block">${q.explanation}</small></div>`;
            });

            const percent = total ? Math.round((score / total) * 100) : 0;
            html = `<div class="alert alert-info fs-5 text-center mb-4">
                        Score: <strong>${score}/${total}</strong> (${percent}%)
                    </div>` + html;

            document.getElementById("quiz-container").innerHTML = html;
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            document.documentElement.setAttribute('data-bs-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
